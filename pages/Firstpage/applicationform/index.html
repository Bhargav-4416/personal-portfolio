<!DOCTYPE html>
<html lang="en">
<head>
    <title>applicationform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form>
        <h2>Student Admission form</h2>
        <fieldset>
            <legend>Personal Details</legend>
            
            <label>Full Name</label> <br>
            <input type="text" autofocus placeholder="Enter Full Name" required>
            
            <label>Email</label>
            <input type="email" placeholder="Enter email" required>

            <label>Password</label>
            <input type="password" required>

            <label>Mobile Number</label>
            <input type="tel" pattern="[0-9]{10}" placeholder="Enter 10- digit number" required>

            <label>Date of Birth</label>
            <input type="date">

            <label>Age</label>
            <input type="number" min="17" max="60">
        </fieldset>
        <fieldset>
            <legend>Academic Details</legend>
            <label>Course</label> <br>
            <select required>
                <option value="">Select</option>
                <option>B.Tech</option>
                <option>BCA</option>
                <option>MBA</option>
                <option>M.Tech</option>
            </select>
            
            <label>Branch</label>
            <input type="text" list="Branches">
            <datalist id = "Branches">
                <option>CSE</option>
                <option>ECE</option>
                <option>AIDS</option>
                <option>Arts & Science</option>
            </datalist>

            <label>Percentage</label>
            <input type="range" min="40" max="99">
        </fieldset>
        <fieldset>
            <legend>Preferences</legend>
            <label>Gender</label> <br>
            <input type="radio" name="gender">Female
            <input type="radio" name="gender">Male 
            <br>

            <label>Languages Known</label>
            <input type="checkbox"> Telugu
            <input type="checkbox"> English
            <input type="checkbox"> Hindi
            <br>
            

            <label>Upload Photo</label>
            <input type="file">

            <label>Comments</label>
            <textarea rows="5"></textarea>
            

        </fieldset>
        <button>Submit</button>
        <button>Cancel</button>
        
    </form>


    
</body>
</html>
