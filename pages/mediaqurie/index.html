.box {

  font-size: 24px;
  border-radius: 10px;

@media(min-width:350){
    .box{
        background-color: red;
        border-radius: 50%;
    }
}
@media(min-width:351) and (max-width:850){
    .box{
        background-color: blue;
    }
}
@media(max-width:851){
    .box{

}

<p>Resize the browser window to see the background color change.</p>
